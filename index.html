<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a serious question...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }
        #card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 400px;
            z-index: 10;
        }
        img {
            width: 100%;
            max-width: 220px;
            border-radius: 15px;
            margin-bottom: 10px;
        }
        h1 {
            color: #ff4d6d;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .btn-group {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100px;
        }
        button {
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        #noBtn { 
            background-color: #ff4d6d; 
            color: white; 
            position: absolute; 
            z-index: 999;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="card">
        <div id="ask">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHYybmZueXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qUIm586OTazL2/giphy.gif">
            <h1>Will you be my girlfriend? ❤️</h1>
            <div class="btn-group">
                <button id="yesBtn">Yes!</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="celebrate" class="hidden">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnJueXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l41lI4bYI0fKxMzyU/giphy.gif">
            <h1>BEST CHOICE EVER! </h1>
            <p>I'm the luckiest guy in the world!</p>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        let yesSize = 1;

        const move = () => {
            // Makes the "No" button jump to a random spot
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Makes the "Yes" button grow bigger every time she tries to click "No"
            yesSize += 0.15;
            yesBtn.style.transform = `scale(${yesSize})`;
        };

        // For mobile and desktop
        noBtn.addEventListener('mouseover', move);
        noBtn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            move(); 
        });

        yesBtn.addEventListener('click', () => {
            document.getElementById('ask').classList.add('hidden');
            document.getElementById('celebrate').classList.remove('hidden');
            
            // Continuous confetti
            var end = Date.now() + (3 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        });
    </script>
</body>
</html>
